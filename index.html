<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏中心</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            margin: 40px 0;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        .game-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: var(--accent-color);
        }

        .game-info {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 1.5rem;
            margin: 0 0 12px 0;
            color: var(--accent-color);
        }

        .game-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.2s;
            align-self: flex-start;
        }

        .game-card:hover .btn {
            background-color: var(--accent-hover);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 小游戏中心</h1>
        <p style="color: #64748b;">选择一个游戏开始玩耍吧！</p>
    </header>

    <div class="container">
        <a href="snake/index.html" class="game-card">
            <div class="game-info">
                <h2 class="game-title">🐍 贪吃蛇</h2>
                <p class="game-desc">经典的贪吃蛇游戏。支持触控、摇盘和键盘控制，拥有多种难度等级，挑战你的最高分！</p>
                <div class="btn">立即开始</div>
            </div>
        </a>

        <a href="auto-chess/index.html" class="game-card">
            <div class="game-info">
                <h2 class="game-title">⚔️ 自走棋对战</h2>
                <p class="game-desc">精简版自走棋。购买棋子、凑齐羁绊、升级星级，带领你的国王战胜对手！</p>
                <div class="btn">立即开始</div>
            </div>
        </a>
    </div>

    <footer style="margin-top: auto; padding: 40px; color: #475569; font-size: 0.9rem;">
        &copy; 2023 游戏中心项目
    </footer>
</body>
</html>
