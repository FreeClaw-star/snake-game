<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>贪吃蛇 🐍</title>
    <style>
        * { 
            touch-action: none; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #fff;
            overflow: hidden;
            padding: 10px;
            box-sizing: border-box;
        }
        h1 { margin: 5px 0; font-size: 20px; }
        
        .difficulty {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .diff-btn {
            padding: 6px 14px;
            font-size: 13px;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 15px;
            color: #aaa;
            cursor: pointer;
        }
        .diff-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: white;
        }
        
        /* 模式切换按钮 */
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .mode-btn {
            padding: 6px 14px;
            font-size: 12px;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 15px;
            color: #aaa;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #4ecca3;
            border-color: #4ecca3;
            color: #1a1a2e;
        }
        
        .score {
            font-size: 14px;
            margin: 5px 0;
        }
        
        #gameCanvas {
            border: 3px solid #0f3460;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }
        
        /* 触控区域 - 画布下方 */
        .touch-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            width: 100%;
        }
        
        /* 十字方向键 - 3x3布局 */
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 55px);
            grid-template-rows: repeat(3, 50px);
            gap: 3px;
        }
        
        .dpad .touch-btn.up { grid-column: 2; grid-row: 1; }
        .dpad .touch-btn.left { grid-column: 1; grid-row: 2; }
        .dpad .touch-btn.center { grid-column: 2; grid-row: 2; background: transparent; border: none; }
        .dpad .touch-btn.down { grid-column: 2; grid-row: 3; }
        .dpad .touch-btn.right { grid-column: 3; grid-row: 2; }
        
        .speed-btn {
            width: 70px;
            height: 70px;
            font-size: 14px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .touch-btn {
            width: 55px;
            height: 50px;
            font-size: 22px;
            background: #2a2a4a;
            border: 2px solid #4a4a6a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .restart-btn {
            margin-top: 10px;
            padding: 10px 25px;
            font-size: 15px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .info { 
            font-size: 11px; 
            color: #666; 
            margin-top: 8px; 
        }
        
        /* 平板适配 */
        @media (min-width: 768px) {
            #gameCanvas {
                width: 400px;
                height: 400px;
            }
            .dpad {
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(3, 60px);
                gap: 5px;
            }
            .touch-btn {
                width: 70px;
                height: 60px;
                font-size: 28px;
            }
            .speed-btn {
                width: 80px;
                height: 80px;
                font-size: 16px;
            }
            h1 { font-size: 28px; }
            .score { font-size: 18px; }
        }
        
        /* 小手机 */
        @media (max-width: 380px) {
            #gameCanvas {
                width: 280px;
                height: 280px;
            }
            .dpad {
                grid-template-columns: repeat(3, 45px);
                grid-template-rows: repeat(3, 42px);
            }
            .touch-btn {
                width: 45px;
                height: 42px;
                font-size: 18px;
            }
            .speed-btn {
                width: 60px;
                height: 60px;
                font-size: 12px;
            }
            .touch-area { gap: 12px; }
        }
    </style>
</head>
<body>
    <h1>🐍 贪吃蛇</h1>
    
    <div class="mode-switch">
        <button class="mode-btn active" id="touchModeBtn" onclick="setMode('touch')">👆 触控</button>
        <button class="mode-btn" id="tiltModeBtn" onclick="setMode('tilt')">📱 摇盘</button>
    </div>
    
    <div class="difficulty">
        <button class="diff-btn active" onclick="setDifficulty(1)">简单</button>
        <button class="diff-btn" onclick="setDifficulty(2)">中等</button>
        <button class="diff-btn" onclick="setDifficulty(3)">困难</button>
    </div>
    
    <div class="score">得分: <span id="score">0</span> | 速度: <span id="speedLevel">1</span>x | <span id="diffName">简单</span></div>
    
    <canvas id="gameCanvas" width="320" height="320"></canvas>
    
    <!-- 触控区域移到下方 -->
    <div class="touch-area">
        <div class="dpad">
            <div class="touch-btn up" ontouchstart="handleTouch(event, 'up')">⬆️</div>
            <div class="touch-btn left" ontouchstart="handleTouch(event, 'left')">⬅️</div>
            <div class="touch-btn center"></div>
            <div class="touch-btn down" ontouchstart="handleTouch(event, 'down')">⬇️</div>
            <div class="touch-btn right" ontouchstart="handleTouch(event, 'right')">➡️</div>
        </div>
        
        <div class="speed-btn" ontouchstart="handleTouch(event, 'speed')">
            ⚡<br>加速
        </div>
    </div>
    
    <button class="restart-btn" onclick="resetGame()">重新开始</button>
    
    <div class="info">电脑：方向键/WASD | 空格加速</div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const gridSize = 16;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let snake = [];
        let food = { x: 10, y: 10 };
        let obstacles = [];
        let dx = 0;
        let dy = 0;
        let speedLevel = 1;
        let difficulty = 1;
        let baseSpeed = 120;
        let gameLoop;
        let isRunning = false;
        let lastDirectionChange = 0;
        
        // 摇盘模式
        let controlMode = 'touch'; // 'touch' 或 'tilt'
        let tiltX = 0;
        let tiltY = 0;
        let lastTiltDirection = '';
        
        const difficultySettings = {
            1: { name: '简单', speed: 120, obstacles: 3, growBonus: 1 },
            2: { name: '中等', speed: 90, obstacles: 6, growBonus: 1 },
            3: { name: '困难', speed: 60, obstacles: 10, growBonus: 2 }
        };
        
        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.diff-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i + 1 === level);
            });
            document.getElementById('diffName').textContent = difficultySettings[level].name;
            if (!isRunning) init();
        }
        
        // 切换控制模式
        function setMode(mode) {
            controlMode = mode;
            document.getElementById('touchModeBtn').classList.toggle('active', mode === 'touch');
            document.getElementById('tiltModeBtn').classList.toggle('active', mode === 'tilt');
            
            // 显示/隐藏触控区域
            document.querySelector('.touch-area').style.display = mode === 'touch' ? 'flex' : 'none';
            
            if (mode === 'tilt') {
                requestTiltPermission();
            }
        }
        
        // 请求重力感应权限（iOS 13+ 需要）
        function requestTiltPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && 
                typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(permission => {
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleTilt);
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('deviceorientation', handleTilt);
            }
        }
        
        // 处理重力感应
        function handleTilt(event) {
            if (controlMode !== 'tilt' || !isRunning) return;
            
            const gamma = event.gamma; // 左右倾斜 (-90 to 90)
            const beta = event.beta;   // 前后倾斜 (-180 to 180)
            
            if (gamma === null || beta === null) return;
            
            const now = Date.now();
            if (now - lastDirectionChange < 150) return; // 限制转向频率
            
            // 判定方向（带死区，避免抖动）
            let newDx = dx;
            let newDy = dy;
            
            if (Math.abs(gamma) > 15) {
                // 左右倾斜
                if (gamma > 15 && dx !== -1) {
                    newDx = 1; newDy = 0;
                    if (lastTiltDirection !== 'right') { dx = 1; dy = 0; lastTiltDirection = 'right'; lastDirectionChange = now; }
                } else if (gamma < -15 && dx !== 1) {
                    newDx = -1; newDy = 0;
                    if (lastTiltDirection !== 'left') { dx = -1; dy = 0; lastTiltDirection = 'left'; lastDirectionChange = now; }
                }
            } else if (Math.abs(beta) > 15) {
                // 前后倾斜
                if (beta > 15 && dy !== -1) {
                    newDx = 0; newDy = 1;
                    if (lastTiltDirection !== 'down') { dx = 0; dy = 1; lastTiltDirection = 'down'; lastDirectionChange = now; }
                } else if (beta < 15 && dy !== 1) {
                    newDx = 0; newDy = -1;
                    if (lastTiltDirection !== 'up') { dx = 0; dy = -1; lastTiltDirection = 'up'; lastDirectionChange = now; }
                }
            }
        }
        
        function init() {
            const settings = difficultySettings[difficulty];
            baseSpeed = settings.speed;
            
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            speedLevel = 1;
            lastDirectionChange = 0;
            generateObstacles(settings.obstacles);
            placeFood();
            updateScore();
            updateSpeedDisplay();
        }
        
        function generateObstacles(count) {
            obstacles = [];
            for (let i = 0; i < count; i++) {
                let obs, valid;
                do {
                    valid = true;
                    obs = {
                        x: Math.floor(Math.random() * tileCount),
                        y: Math.floor(Math.random() * tileCount)
                    };
                    for (let segment of snake) {
                        if (obs.x === segment.x && obs.y === segment.y) { valid = false; break; }
                    }
                    if (obs.x === food.x && obs.y === food.y) valid = false;
                } while (!valid);
                obstacles.push(obs);
            }
        }
        
        function placeFood() {
            let valid;
            do {
                valid = true;
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) { valid = false; break; }
                }
                for (let obs of obstacles) {
                    if (food.x === obs.x && food.y === obs.y) { valid = false; break; }
                }
            } while (!valid);
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        function updateSpeedDisplay() {
            document.getElementById('speedLevel').textContent = speedLevel;
        }
        
        // 颜色配置
        const colors = {
            snakeHead: '#e94560',
            snakeBody: ['#ff6b6b', '#ff8e8e', '#ffa0a0', '#ffb2b2'],
            food: ['#4ecca3', '#45b7aa', '#ffd93d', '#ff6b6b', '#a855f7'],
            obstacles: ['#4a4a6a', '#5a5a7a', '#3a3a5a']
        };
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制障碍物（彩色）
            ctx.fillStyle = colors.obstacles[Math.floor(Math.random() * colors.obstacles.length)];
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x * gridSize, obs.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // 绘制蛇（彩色渐变）
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = colors.snakeHead;
                } else {
                    const colorIndex = (index - 1) % colors.snakeBody.length;
                    ctx.fillStyle = colors.snakeBody[colorIndex];
                }
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            // 绘制食物（彩色闪烁）
            ctx.fillStyle = colors.food[Math.floor(Date.now() / 200) % colors.food.length];
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
        }
        
        function handleTouch(event, action) {
            event.preventDefault();
            
            if (action === 'speed') {
                toggleSpeed();
                return;
            }
            
            const now = Date.now();
            
            if (!isRunning) {
                resetGame();
                return;
            }
            
            if (now - lastDirectionChange < 50) return;
            lastDirectionChange = now;
            
            switch(action) {
                case 'up': 
                    if (dy !== 1) { dx = 0; dy = -1; } 
                    break;
                case 'down': 
                    if (dy !== -1) { dx = 0; dy = 1; } 
                    break;
                case 'left': 
                    if (dx !== 1) { dx = -1; dy = 0; } 
                    break;
                case 'right': 
                    if (dx !== -1) { dx = 1; dy = 0; } 
                    break;
            }
        }
        
        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }
            
            for (let obs of obstacles) {
                if (head.x === obs.x && head.y === obs.y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                const settings = difficultySettings[difficulty];
                score += 10 * settings.growBonus;
                updateScore();
                
                const threshold = difficulty === 3 ? 30 : 50;
                if (score % threshold === 0) {
                    generateObstacles(obstacles.length + 1);
                }
                placeFood();
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.font = '24px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('游戏结束!', canvas.width / 2, canvas.height / 2);
            ctx.font = '14px sans-serif';
            ctx.fillText(`最终得分: ${score}`, canvas.width / 2, canvas.height / 2 + 25);
        }
        
        function toggleSpeed() {
            if (speedLevel < 3) speedLevel++;
            else speedLevel = 1;
            updateSpeedDisplay();
            
            if (isRunning) {
                clearInterval(gameLoop);
                const settings = difficultySettings[difficulty];
                gameLoop = setInterval(() => {
                    update();
                    draw();
                }, settings.speed / speedLevel);
            }
        }
        
        function resetGame() {
            clearInterval(gameLoop);
            init();
            isRunning = true;
            const settings = difficultySettings[difficulty];
            gameLoop = setInterval(() => {
                update();
                draw();
            }, settings.speed / speedLevel);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.code === 'Space') {
                e.preventDefault();
                toggleSpeed();
                return;
            }
            
            if (!isRunning && e.key !== 'r' && e.key !== 'R') return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; } break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; } break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; } break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
